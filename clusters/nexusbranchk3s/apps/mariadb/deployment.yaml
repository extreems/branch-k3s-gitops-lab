apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: branch-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - "rm -rf /var/lib/mysql/* && exec docker-entrypoint.sh mariadbd"
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mariadb-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mariadb-data
          emptyDir: {}